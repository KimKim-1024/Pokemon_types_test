<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケモンタイプ診断</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

:root {
  --msg-bg: #f0ece0;
  --msg-border: #2c1e10;
  --msg-shadow: #8a6040;
  --btn-bg: #3060b8;
  --btn-dark: #1a3a80;
  --accent: #c02000;
  --text-dark: #180e04;
  --text-mid: #3c2810;
  --panel-bg: #e8e0cc;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px;
  position: relative;
  overflow-x: hidden;
  background: #3a4a28;
}

/* ==============================
   TOP-DOWN MAP BACKGROUND
   ============================== */
.map-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.map-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ==============================
   MAIN FRAME
   ============================== */
.game-frame {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 520px;
}

/* ==============================
   TITLE SCREEN
   ============================== */
.title-screen { display:flex; flex-direction:column; align-items:center; }
.title-screen.hidden { display:none; }

.title-window {
  width: 100%;
  background: var(--msg-bg);
  border: 4px solid var(--msg-border);
  border-radius: 6px;
  box-shadow: 4px 4px 0 var(--msg-border);
  overflow: hidden;
}
.title-header {
  background: var(--msg-border);
  padding: 8px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.title-header-dots {
  display: flex;
  gap: 5px;
}
.title-header-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #666;
}
.title-header-dot.red { background: #e04040; }
.title-header-dot.yellow { background: #e0c040; }
.title-header-dot.green { background: #40b040; }
.title-header-txt {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #aaa;
  letter-spacing: 1px;
}

.title-body {
  padding: 22px 24px 20px;
  text-align: center;
}

.pokeball-anim {
  display: inline-block;
  font-size: 44px;
  margin-bottom: 12px;
  animation: pSpin 4s linear infinite;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
}
@keyframes pSpin {
  0%   { transform: rotate(0deg) scale(1); }
  45%  { transform: rotate(160deg) scale(1.1); }
  50%  { transform: rotate(180deg) scale(1); }
  95%  { transform: rotate(340deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}

.title-logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: var(--accent);
  line-height: 1.9;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.title-logo-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: #888;
  margin-bottom: 18px;
  letter-spacing: 1px;
}

.title-msg {
  background: var(--panel-bg);
  border: 2px solid #b0a080;
  border-radius: 4px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.8;
  text-align: left;
  margin-bottom: 16px;
}

.start-btn {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  background: var(--btn-bg);
  color: #fff;
  border: 3px solid var(--btn-dark);
  border-bottom: 5px solid var(--btn-dark);
  border-right: 5px solid var(--btn-dark);
  padding: 11px 26px;
  cursor: pointer;
  border-radius: 4px;
  letter-spacing: 1px;
  animation: blinkBtn 1.5s step-start infinite;
  transition: background .1s;
}
.start-btn:hover { background: #2050a0; animation: none; }
.start-btn:active { transform: translate(2px,2px); border-bottom-width: 3px; border-right-width: 3px; }
@keyframes blinkBtn { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ==============================
   QUIZ AREA
   ============================== */
.quiz-area { display:none; }
.quiz-area.visible { display:block; }

.question-window {
  width: 100%;
  background: var(--msg-bg);
  border: 4px solid var(--msg-border);
  border-radius: 6px;
  box-shadow: 4px 4px 0 var(--msg-border);
  overflow: hidden;
}

.q-header {
  background: var(--msg-border);
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.q-num {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #aaa;
}
.q-progress-outer {
  width: 100px; height: 8px;
  background: #1a1208;
  border-radius: 3px;
  overflow: hidden;
  border: 1px solid #555;
}
.q-progress-inner {
  height: 100%;
  background: linear-gradient(90deg, #c0a000, #f8c800);
  transition: width .4s ease;
}

.q-body {
  padding: 14px 18px 10px;
}
.question-text {
  font-size: 13.5px;
  font-weight: 800;
  color: var(--text-dark);
  line-height: 1.75;
  min-height: 48px;
}

/* RPG choice menu */
.choice-panel {
  background: var(--panel-bg);
  border-top: 3px solid #b0a080;
}

.choice-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  border: none;
  border-bottom: 2px solid #c8b888;
  background: transparent;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  padding: 13px 16px;
  cursor: pointer;
  text-align: left;
  transition: background .1s;
  position: relative;
}
.choice-btn:last-child { border-bottom: none; }

.choice-cursor {
  font-size: 11px;
  color: var(--accent);
  transition: opacity .12s, transform .12s;
  opacity: 0;
  flex-shrink: 0;
  width: 14px;
}
.choice-btn:hover .choice-cursor { opacity:1; transform: translateX(2px); }
.choice-btn:hover { background: #fffaec; }
.choice-btn:active { background: #ffe8a0; }

/* ==============================
   RESULT SCREEN
   ============================== */
.result-screen { display:none; }
.result-screen.visible { display:block; }

.result-window {
  width: 100%;
  background: var(--msg-bg);
  border: 4px solid var(--msg-border);
  border-radius: 6px;
  box-shadow: 4px 4px 0 var(--msg-border);
  overflow: hidden;
}

.result-header {
  background: var(--msg-border);
  padding: 6px 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.result-header-txt {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  color: #c8a840;
  letter-spacing: 3px;
}

.result-top {
  padding: 20px 20px 14px;
  text-align: center;
  border-bottom: 3px solid #b0a080;
}

.result-icon {
  font-size: 66px;
  line-height: 1;
  margin-bottom: 10px;
  display: block;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.18));
  animation: rPop .55s cubic-bezier(.34,1.56,.64,1);
}
@keyframes rPop { from{transform:scale(0) rotate(-15deg)} to{transform:scale(1) rotate(0)} }

.result-badge {
  display: inline-block;
  padding: 7px 22px;
  border-radius: 4px;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  border: 3px solid rgba(0,0,0,0.22);
  box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  letter-spacing: 1px;
  color: #fff;
}

.result-body {
  padding: 14px 16px 16px;
}

.result-desc {
  font-size: 12.5px;
  font-weight: 700;
  line-height: 1.8;
  color: var(--text-dark);
  margin-bottom: 10px;
}

.info-panel {
  background: var(--panel-bg);
  border: 2px solid #b8a878;
  border-radius: 4px;
  padding: 9px 13px;
  margin-bottom: 9px;
}
.info-panel-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  color: #888;
  margin-bottom: 7px;
  letter-spacing: 1px;
}
.pokemon-names {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-mid);
  line-height: 1.6;
}
.pokemon-names span { color: var(--btn-bg); }

/* Compatibility */
.compat-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.compat-row:last-child { margin-bottom: 0; }
.compat-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-mid);
  min-width: 88px;
  padding-top: 2px;
  flex-shrink: 0;
}
.type-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 800;
  border: 1px solid rgba(0,0,0,0.18);
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  margin-bottom: 3px;
}
.type-chip.dt { color:#222; text-shadow:none; }

/* Triangle display - SVG-based */
.triangle-wrap {
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid #d0c8a8;
}
.triangle-wrap:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.tri-svg-container {
  width: 100%;
  max-width: 260px;
  margin: 0 auto;
  display: block;
}

/* Back button */
.back-btn-wrap {
  padding: 6px 0 0;
  border-top: 2px solid #c8b888;
}
.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  border: none;
  background: transparent;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: #7a6040;
  padding: 8px 16px;
  cursor: pointer;
  text-align: left;
  transition: background .1s, color .1s;
  border-radius: 0 0 4px 4px;
}
.back-btn:hover { background: #fffaec; color: var(--accent); }
.back-btn:disabled { opacity: .35; cursor: default; }
.back-btn:disabled:hover { background: transparent; color: #7a6040; }
.back-btn-icon { font-size: 12px; }

/* Axis bars */
.axis-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
}
.axis-lbl { font-size:10px; font-weight:700; color:var(--text-mid); width:48px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.axis-lbl-r { font-size:10px; font-weight:700; color:var(--text-mid); width:48px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.axis-track {
  flex:1;
  height: 10px;
  background: #d8d0b0;
  border: 1px solid #b0a070;
  border-radius: 5px;
  position: relative;
  overflow: hidden;
}
.axis-fill-pos {
  position:absolute; top:0; bottom:0; right:50%;
  background: linear-gradient(270deg, #3060b8, #60a0e8);
  border-radius: 4px 0 0 4px;
  transition: width .7s cubic-bezier(.34,1.56,.64,1);
}
.axis-fill-neg {
  position:absolute; top:0; bottom:0; left:50%;
  background: linear-gradient(90deg, #c02000, #e86030);
  border-radius: 0 4px 4px 0;
  transition: width .7s cubic-bezier(.34,1.56,.64,1);
}
.axis-mid {
  position:absolute; top:0; bottom:0;
  left:50%; transform:translateX(-50%);
  width:2px; background:#888; z-index:2;
}

.retry-btn {
  display:block; width:100%;
  font-family:'Press Start 2P',monospace;
  font-size:9px;
  background: var(--btn-bg);
  color: #fff;
  border:3px solid var(--btn-dark);
  border-bottom:5px solid var(--btn-dark);
  border-right:5px solid var(--btn-dark);
  padding:12px; cursor:pointer; border-radius:4px; letter-spacing:1px;
  margin-top: 4px;
}
.retry-btn:hover { background:#2050a0; }
.retry-btn:active { transform:translate(2px,2px); border-bottom-width:3px; border-right-width:3px; }

/* ==============================
   TYPE BADGE COLORS
   ============================== */
.tc-normal   { background:#9a9870; }
.tc-fire     { background:#d06820; }
.tc-water    { background:#4870e0; }
.tc-electric { background:#c8a800; }
.tc-grass    { background:#508838; }
.tc-ice      { background:#5898a8; }
.tc-fighting { background:#a02020; }
.tc-poison   { background:#882888; }
.tc-ground   { background:#b09048; }
.tc-flying   { background:#7868c8; }
.tc-psychic  { background:#c83870; }
.tc-bug      { background:#789018; }
.tc-rock     { background:#988828; }
.tc-ghost    { background:#504878; }
.tc-dragon   { background:#5018d8; }
.tc-dark     { background:#484030; }
.tc-steel    { background:#8888a0; }
.tc-fairy    { background:#c87898; }
</style>
</head>

    weights:[[3,+1,3],[4,-1,2],[1,+1,1]],
    desc:"独自の論理と自由な戦略で相手の裏をかくタイプ。ルールより結果を重視し、冷静に最善手を打つ。あなたは誰よりも賢く、型にはまらない戦い方ができます。",
    pokemon:"ゾロアーク、バンギラス、ヘルガー" },

    pokemon:"ハガネール、エアームド、ジバコイル" },
  { name:"フェアリー",cls:"tc-fairy",   icon:"🌸", dt:true,
    weights:[[4,+1,3],[5,+1,2],[1,-1,1]],
    desc:"温かさと秩序の中で周囲を守る、心のタイプ。みんなが笑顔でいられるよう調和を大切にし、感情で仲間を包む。あなたの優しさと安定感はチームになくてはならない存在です。",
    pokemon:"トゲキッス、サーナイト、マリルリ" },
];

// ===== TYPE EFFECTIVENESS =====
// superEffective[attacker] = types it hits super-effectively
const superEffective = {
  'ノーマル':  [],
  'かくとう':  ['ノーマル','こおり','いわ','あく','はがね'],
  'どく':      ['くさ','フェアリー'],
  'じめん':    ['ほのお','でんき','どく','いわ','はがね'],
  'ひこう':    ['くさ','かくとう','むし'],
  'むし':      ['くさ','エスパー','あく'],
  'いわ':      ['ほのお','こおり','ひこう','むし'],
  'ゴースト':  ['エスパー','ゴースト'],
  'はがね':    ['こおり','いわ','フェアリー'],
  'ほのお':    ['くさ','こおり','むし','はがね'],
  'みず':      ['ほのお','じめん','いわ'],
  'でんき':    ['みず','ひこう'],
  'くさ':      ['みず','じめん','いわ'],
  'こおり':    ['くさ','じめん','ひこう','ドラゴン'],
  'エスパー':  ['かくとう','どく'],
  'ドラゴン':  ['ドラゴン'],
  'あく':      ['エスパー','ゴースト'],
  'フェアリー':['かくとう','ドラゴン','あく'],
};

// Build weakTo (reverse): weakTo[defender] = attackers that hit it super-effectively
const weakTo = {};
types.forEach(t => weakTo[t.name] = []);
Object.entries(superEffective).forEach(([atk, defs]) => {
  defs.forEach(def => { if(weakTo[def]) weakTo[def].push(atk); });
});

// Pre-compute all triangles: A→B→C→A
const allTriangles = [];
const typeNames = types.map(t=>t.name);
for(let i=0;i<typeNames.length;i++){
  for(let j=i+1;j<typeNames.length;j++){
    for(let k=j+1;k<typeNames.length;k++){
      const [a,b,c]=[typeNames[i],typeNames[j],typeNames[k]];
      const pairs=[[a,b,c],[a,c,b]];
      pairs.forEach(([x,y,z])=>{
        if(superEffective[x].includes(y) && superEffective[y].includes(z) && superEffective[z].includes(x)){
          allTriangles.push([x,y,z]);
        }
      });
    }
  }
}

const nameToCls = {}, nameDt = {};
types.forEach(t => { nameToCls[t.name]=t.cls; nameDt[t.name]=t.dt; });

let scores=[0,0,0,0,0,0], currentQ=0;
// History: array of {axis, score} for each answered question
let history=[];
const posLbl=['外向的','論理的','現実的','攻撃的','秩序','安定'];
const negLbl=['内向的','感情的','直感的','防御的','自由','変化'];

function startQuiz(){
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('quizArea').classList.add('visible');
  renderQuestion();
}

function renderQuestion(){
  const q=questions[currentQ];
  document.getElementById('questionNum').textContent=`しつもん ${currentQ+1}/${questions.length}`;
  document.getElementById('progressBar').style.width=`${(currentQ/questions.length)*100}%`;
  document.getElementById('questionText').textContent=q.text;

  // Back button
  const backBtn=document.getElementById('backBtn');
  backBtn.disabled = (currentQ===0);

  const panel=document.getElementById('choicePanel');
  panel.innerHTML='';
  [{text:q.choiceA,score:+1},{text:q.choiceB,score:-1}].forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-cursor">▶</span>${opt.text}`;
    btn.onclick=()=>{
      // Save to history before advancing
      history.push({axis:q.axis, score:opt.score});
      scores[q.axis]+=opt.score;
      currentQ++;
      currentQ>=questions.length?showResult():renderQuestion();
    };
    panel.appendChild(btn);
  });
}

function goBack(){
  if(currentQ===0||history.length===0) return;
  // Undo last answer
  const last=history.pop();
  scores[last.axis]-=last.score;
  currentQ--;
  renderQuestion();
}

function makeChip(name){
  const chip=document.createElement('span');
  chip.className='type-chip '+(nameToCls[name]||'');
  if(nameDt[name]) chip.classList.add('dt');
  chip.textContent=name;
  return chip;
}

// Render one triangle as an inline SVG with chips at each vertex and arrows on edges
function renderTriangleSVG(tri){
  // tri = [A, B, C] where A→B→C→A
  // Smaller canvas: W=180, H=152 with tighter vertex positions
  const W=180, H=152;
  // Equilateral triangle vertices - top=A, bottom-left=B, bottom-right=C
  // Center at (90, 82), radius=56
  const cx=90, cy=82, r=56;
  const verts=[
    {x: cx,                        y: cy - r},          // top
    {x: cx - r*Math.sin(Math.PI*2/3), y: cy - r*Math.cos(Math.PI*2/3)}, // bottom-left
    {x: cx + r*Math.sin(Math.PI*2/3), y: cy - r*Math.cos(Math.PI*2/3)}, // bottom-right
  ];

  const clsColorMap={
    'tc-normal':'#9a9870','tc-fire':'#d06820','tc-water':'#4870e0',
    'tc-electric':'#c8a800','tc-grass':'#508838','tc-ice':'#5898a8',
    'tc-fighting':'#a02020','tc-poison':'#882888','tc-ground':'#b09048',
    'tc-flying':'#7868c8','tc-psychic':'#c83870','tc-bug':'#789018',
    'tc-rock':'#988828','tc-ghost':'#504878','tc-dragon':'#5018d8',
    'tc-dark':'#484030','tc-steel':'#8888a0','tc-fairy':'#c87898',
  };
  const dtSet=new Set(['tc-electric','tc-ground','tc-steel','tc-fairy']);

  const edges=[ {from:0,to:1}, {from:1,to:2}, {from:2,to:0} ];

  // Chip half-width/height for padding calculation
  const cw=48, ch=18, padPx=26;

  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:4px auto;">
  <defs>
    <marker id="arr${tri.join('')}" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7a6040"/>
    </marker>
  </defs>`;

  // Draw edges: shorten by padPx from each end for uniform gap
  edges.forEach(({from,to})=>{
    const fx=verts[from].x, fy=verts[from].y;
    const tx=verts[to].x,   ty=verts[to].y;
    const dx=tx-fx, dy=ty-fy;
    const len=Math.sqrt(dx*dx+dy*dy);
    const ux=dx/len, uy=dy/len;
    const x1=fx+ux*padPx, y1=fy+uy*padPx;
    const x2=tx-ux*padPx, y2=ty-uy*padPx;
    svg+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
      stroke="#b0a070" stroke-width="1.5" marker-end="url(#arr${tri.join('')})"/>`;
  });

  // Draw type chips at each vertex
  verts.forEach((v,i)=>{
    const name=tri[i];
    const cls=nameToCls[name]||'tc-normal';
    const bg=clsColorMap[cls]||'#888';
    const textCol=dtSet.has(cls)?'#333':'#fff';
    svg+=`<rect x="${(v.x-cw/2).toFixed(1)}" y="${(v.y-ch/2).toFixed(1)}" width="${cw}" height="${ch}"
      rx="3" fill="${bg}" stroke="rgba(0,0,0,0.18)" stroke-width="1"/>
    <text x="${v.x.toFixed(1)}" y="${(v.y+5).toFixed(1)}" text-anchor="middle"
      font-size="9" font-weight="800" fill="${textCol}" font-family="'M PLUS Rounded 1c',sans-serif">${name}</text>`;
  });

  svg+='</svg>';
  return svg;
}

function showResult(){
  document.getElementById('quizArea').classList.remove('visible');
  document.getElementById('resultScreen').classList.add('visible');

  let best=null,bestScore=-Infinity;
  types.forEach(t=>{
    let s=0;
    t.weights.forEach(([ax,dir,pts])=>s+=scores[ax]*dir*pts);
    if(s>bestScore){bestScore=s;best=t;}
  });

  document.getElementById('resultIcon').textContent=best.icon;
  const badge=document.getElementById('resultBadge');
  badge.textContent=best.name+'タイプ';
  badge.className='result-badge '+best.cls;
  badge.style.color=best.dt?'#222':'#fff';

  document.getElementById('resultDesc').textContent=best.desc;
  document.getElementById('resultPokemon').innerHTML=`<span>${best.pokemon}</span>`;

  // ===== TYPE COMPATIBILITY =====
  const compat=document.getElementById('compatBox');
  compat.innerHTML='<div class="info-panel-title">タイプ相性</div>';
  const myGood=superEffective[best.name]||[];
  const myBad=weakTo[best.name]||[];
  [
    {label:'🟢 弱点をつける相手', list:myGood},
    {label:'🔴 弱点をつかれる相手', list:myBad},
  ].forEach(r=>{
    const row=document.createElement('div');
    row.className='compat-row';
    const lbl=document.createElement('span');
    lbl.className='compat-label';
    lbl.textContent=r.label;
    row.appendChild(lbl);
    if(r.list.length===0){
      const none=document.createElement('span');
      none.style.cssText='font-size:11px;color:#888;font-weight:700;';
      none.textContent='なし';
      row.appendChild(none);
    } else {
      r.list.forEach(name=>row.appendChild(makeChip(name)));
    }
    compat.appendChild(row);
  });

  // ===== TRIANGLES =====
  const myTriangles=allTriangles.filter(tri=>tri.includes(best.name));
  const triBox=document.getElementById('triangleBox');
  if(myTriangles.length>0){
    triBox.innerHTML='<div class="info-panel-title">⚖️ 相性の良い仲間（三すくみ）</div>';
    triBox.style.display='';
    myTriangles.forEach(tri=>{
      // Rotate so best.name is first (top vertex)
      const idx=tri.indexOf(best.name);
      const ordered=[tri[idx],tri[(idx+1)%3],tri[(idx+2)%3]];
      const wrap=document.createElement('div');
      wrap.className='triangle-wrap';
      wrap.innerHTML=renderTriangleSVG(ordered);
      triBox.appendChild(wrap);
    });
  } else {
    triBox.style.display='none';
  }

  // ===== AXES =====
  const table=document.getElementById('axesTable');
  table.innerHTML='';
  const maxS=3;
  scores.forEach((val,i)=>{
    const pct=Math.min(50,Math.abs(val)/maxS*50);
    const row=document.createElement('div');
    row.className='axis-row';
    row.innerHTML=`
      <div class="axis-lbl">${posLbl[i]}</div>
      <div class="axis-track">
        <div class="axis-mid"></div>
        ${val>=0
          ?`<div class="axis-fill-pos" style="width:${pct}%"></div>`
          :`<div class="axis-fill-neg" style="width:${pct}%"></div>`}
      </div>
      <div class="axis-lbl-r">${negLbl[i]}</div>`;
    table.appendChild(row);
  });
}

function resetQuiz(){
  scores=[0,0,0,0,0,0]; currentQ=0; history=[];
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('titleScreen').classList.remove('hidden');
  document.getElementById('progressBar').style.width='0%';
  document.getElementById('triangleBox').style.display='';
}
</script>
